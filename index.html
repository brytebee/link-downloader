<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Downloader & Transcriber</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --card-bg: rgba(30, 41, 59, 0.7); /* Translucent Slate 800 */
            --text-main: #f8fafc; /* Slate 50 */
            --text-muted: #94a3b8; /* Slate 400 */
            --primary: #3b82f6; /* Blue 500 */
            --primary-hover: #2563eb; /* Blue 600 */
            --secondary: #10b981; /* Emerald 500 */
            --secondary-hover: #059669; /* Emerald 600 */
            --border: rgba(51, 65, 85, 0.5); /* Translucent Slate 700 */
            --error: #ef4444; /* Red 500 */
            --glass-blur: 12px;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        h1 {
            margin-top: 0;
            font-size: 1.85rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            letter-spacing: -0.025em;
        }

        /* Mode Switcher Pill */
        .mode-switcher {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 2.5rem;
            position: relative;
            border: 1px solid var(--border);
        }

        .mode-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            z-index: 1;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-tab.active {
            color: white;
        }

        .mode-glider {
            position: absolute;
            height: calc(100% - 12px);
            width: calc(50% - 6px);
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border-radius: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .mode-transcribe .mode-glider {
            transform: translateX(100%);
            background: linear-gradient(135deg, var(--secondary), #059669);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Forms Layout */
        .input-group {
            margin-bottom: 1.5rem;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .url-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        input[type="url"], input[type="text"], select {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.4);
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .mode-transcribe input:focus, .mode-transcribe select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* Option Groups (Conditional) */
        .option-group {
            display: block;
            opacity: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 500px;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            margin: 0;
        }

        .browse-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn-browse {
            width: auto;
            padding: 0 1.25rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            font-weight: 500;
        }

        /* Clear Button */
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-muted);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* Progress Area */
        #progress-container {
            display: none;
            margin: 2rem 0;
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        progress {
            width: 100%;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            appearance: none;
        }
        progress::-webkit-progress-bar { background-color: rgba(255, 255, 255, 0.05); }
        progress::-webkit-progress-value { 
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            transition: width 0.4s ease; 
        }

        .mode-transcribe progress::-webkit-progress-value {
            background: linear-gradient(90deg, var(--secondary), #34d399);
        }

        /* Buttons */
        .action-btn-container {
            margin-top: 2rem;
        }

        button.main-btn {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .btn-download-mode { background: linear-gradient(135deg, var(--primary), #1d4ed8); }
        .btn-transcribe-mode { background: linear-gradient(135deg, var(--secondary), #059669); }

        button.main-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        button.main-btn:active { transform: translateY(0); }

        .transcript-container {
            display: none;
            position: relative;
            margin-top: 2rem;
            width: 100%;
        }

        #transcript-result {
            width: 100%;
            height: 200px;
            padding: 1.25rem;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.6;
            border: 1px solid var(--border);
            font-family: inherit;
            resize: vertical;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: none;
            margin-right: 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #status-area {
            display: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        #status-area.info { background: rgba(59, 130, 246, 0.1); color: #93c5fd; }
        #status-area.success { background: rgba(16, 185, 129, 0.1); color: #6ee7b7; }
        #status-area.error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; }
    </style>
</head>
<body class="mode-download">
    <div class="container" id="main-container">
        <h1>Media Extraction</h1>

        <div class="mode-switcher">
            <div class="mode-glider"></div>
            <div class="mode-tab active" onclick="switchMode('download')">
                <span>Download</span>
            </div>
            <div class="mode-tab" onclick="switchMode('transcribe')">
                <span>Transcribe</span>
            </div>
        </div>
        
        <input type="hidden" id="user_id" value="guest_123">

        <div class="url-wrapper">
            <label for="url">Target Link</label>
            <div style="position: relative;">
                <input type="url" id="url" placeholder="Paste link here..." required oninput="handleUrlInput()">
                <button type="button" class="clear-btn" id="clear-url" onclick="clearUrl()">×</button>
            </div>
            <div id="url-spinner" style="font-size: 0.8rem; color: var(--primary); display: none; margin-top: 0.6rem;">
                Analyzing media availability...
            </div>
        </div>

        <div id="status-area"></div>

        <!-- Download Specific Options -->
        <div id="download-group" class="option-group">
            <div class="input-group" id="resolution-group">
                <label for="resolution">Quality & Size</label>
                <select id="resolution"></select>
            </div>
            
            <div class="input-group">
                <label for="save-path">Destination Folder</label>
                <div class="browse-group">
                    <input type="text" id="save-path" placeholder="Using default folder...">
                    <button type="button" class="btn-browse" onclick="browseFolder()">Browse</button>
                </div>
            </div>
        </div>

        <!-- Transcribe Options (Currently auto-detects, but ready for more) -->
        <div id="transcribe-group" class="option-group hidden">
            <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem;">
                AI will automatically detect language and generate a full text transcript.
            </p>
        </div>
        
        <div id="progress-container">
            <div id="progress-label" style="font-size: 0.8rem; margin-bottom: 0.6rem; font-weight: 600;">Downloading...</div>
            <progress id="dl-progress" value="0" max="100"></progress>
            <div class="progress-stats">
                <span id="dl-percent">0%</span>
                <span id="dl-speed">--</span>
                <span id="dl-eta">--</span>
            </div>
        </div>

        <div class="action-btn-container">
            <button id="main-action-btn" class="main-btn btn-download-mode" onclick="executeCurrentMode()">
                <span class="spinner" id="main-spinner"></span>
                <span id="main-btn-text">Start Download</span>
            </button>
        </div>
        
        <button id="btn-open-folder" class="main-btn" style="background:#f59e0b; margin-top:1rem; display:none;" onclick="openOutputFolder()">
            Open Local Folder
        </button>

        <div class="transcript-container" id="transcript-container">
            <button class="copy-btn" onclick="copyTranscript()" id="copy-btn">Copy</button>
            <textarea id="transcript-result" readonly placeholder="AI Transcript will appear here..."></textarea>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentMode = 'download';
        let currentDownloadPath = '';
        let urlDebounceTimer;
        let progressInterval;

        function switchMode(mode) {
            if (progressInterval) {
                if (!confirm("A job is currently running. Switching modes may hide its progress. Continue?")) return;
            }
            
            currentMode = mode;
            const container = document.body;
            const glider = document.querySelector('.mode-glider');
            const tabs = document.querySelectorAll('.mode-tab');
            const btn = document.getElementById('main-action-btn');
            const btnText = document.getElementById('main-btn-text');
            
            // UI Toggle
            if (mode === 'download') {
                container.className = 'mode-download';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                document.getElementById('download-group').classList.remove('hidden');
                document.getElementById('transcribe-group').classList.add('hidden');
                btn.className = 'main-btn btn-download-mode';
                btnText.textContent = 'Start Download';
            } else {
                container.className = 'mode-transcribe';
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
                document.getElementById('download-group').classList.add('hidden');
                document.getElementById('transcribe-group').classList.remove('hidden');
                btn.className = 'main-btn btn-transcribe-mode';
                btnText.textContent = 'Begin Transcription';
            }

            // Hide resolution if not in download mode
            if (mode !== 'download') {
                document.getElementById('resolution-group').style.display = 'none';
            } else {
                handleUrlInput(); // Re-trigger analysis if URL exists
            }
        }

        function handleUrlInput() {
            const url = document.getElementById('url').value;
            const clearBtn = document.getElementById('clear-url');
            clearBtn.style.display = url ? 'flex' : 'none';
            
            // Only fetch formats in download mode
            if (currentMode !== 'download') {
                document.getElementById('resolution-group').style.display = 'none';
                return;
            }

            clearTimeout(urlDebounceTimer);
            if (!url.trim() || !url.startsWith('http')) return;

            document.getElementById('url-spinner').style.display = 'block';
            urlDebounceTimer = setTimeout(() => fetchFormats(url), 800);
        }

        async function fetchFormats(url) {
            try {
                const res = await fetch(`${API_BASE}/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                document.getElementById('url-spinner').style.display = 'none';
                
                if (res.ok && data.status === 'success' && data.formats.length > 0) {
                    const select = document.getElementById('resolution');
                    select.innerHTML = '';
                    data.formats.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f.id;
                        opt.textContent = f.label;
                        select.appendChild(opt);
                    });
                    document.getElementById('resolution-group').style.display = 'block';
                    setStatus('', 'info');
                } else {
                    throw new Error(data.message || "Could not parse formats.");
                }
            } catch (err) {
                document.getElementById('url-spinner').style.display = 'none';
                setStatus(`Link Analysis Error: ${err.message}`, 'error');
            }
        }

        function setStatus(message, type = 'info') {
            const area = document.getElementById('status-area');
            if (!message) { area.style.display = 'none'; return; }
            area.style.display = 'block';
            area.innerHTML = message;
            area.className = type;
        }

        function toggleLoading(isLoading) {
            const btn = document.getElementById('main-action-btn');
            const spinner = document.getElementById('main-spinner');
            const urlInput = document.getElementById('url');
            
            btn.disabled = isLoading;
            urlInput.disabled = isLoading;
            spinner.style.display = isLoading ? 'inline-block' : 'none';
        }

        function executeCurrentMode() {
            handleAction(currentMode);
        }

        async function handleAction(actionType) {
            const urlInput = document.getElementById('url').value.trim();
            const savePath = document.getElementById('save-path').value.trim();
            const formatId = document.getElementById('resolution').value;
            
            if (!urlInput) { setStatus("Enter a link first.", "error"); return; }

            // Reset UI
            setStatus(null);
            document.getElementById('transcript-container').style.display = 'none';
            document.getElementById('btn-open-folder').style.display = 'none';
            toggleLoading(true);

            try {
                const response = await fetch(`${API_BASE}/${actionType}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput, save_path: savePath, format_id: formatId })
                });

                const data = await response.json();
                if (!response.ok || data.status === 'error') throw new Error(data.message);

                pollProgress(data.job_id, actionType);
            } catch (error) {
                setStatus(`Request Failed: ${error.message}`, 'error');
                toggleLoading(false);
            }
        }

        function pollProgress(jobId, actionType) {
            const isDl = actionType === 'download';
            document.getElementById('progress-container').style.display = 'block';
            const label = document.getElementById('progress-label');
            const stats = document.querySelector('.progress-stats');
            
            progressInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/progress/${jobId}`);
                    const json = await res.json();
                    if (!res.ok) throw new Error("Connection lost.");
                    
                    const state = json.data;
                    
                    // Specific status labeling
                    label.textContent = state.status.replace('_', ' ').toUpperCase();
                    
                    // Progress Bar
                    let p = parseFloat((state.percent || "0").replace('%',''));
                    if (isNaN(p)) p = 0;
                    document.getElementById('dl-progress').value = p;
                    document.getElementById('dl-percent').textContent = `${Math.round(p)}%`;
                    
                    if (isDl) {
                        document.getElementById('dl-speed').textContent = state.speed || '--';
                        document.getElementById('dl-eta').textContent = state.eta || '--';
                    } else {
                        document.getElementById('dl-speed').textContent = 'AI Processing';
                        document.getElementById('dl-eta').textContent = 'Generating Text...';
                    }

                    if (state.status === 'finished') {
                        stopPolling();
                        if (isDl) {
                            setStatus(`Success! Saved to folder.`, 'success');
                            currentDownloadPath = state.folder_path;
                            document.getElementById('btn-open-folder').style.display = 'block';
                        } else {
                            setStatus('Transcription Complete!', 'success');
                            const container = document.getElementById('transcript-container');
                            const area = document.getElementById('transcript-result');
                            area.value = state.text;
                            container.style.display = 'block';
                            container.scrollIntoView({ behavior: 'smooth' });
                        }
                    } else if (state.status === 'error') {
                        throw new Error(state.error);
                    }
                } catch (err) {
                    stopPolling();
                    setStatus(`Job Error: ${err.message}`, 'error');
                }
            }, 1000);
        }

        function stopPolling() {
            clearInterval(progressInterval);
            progressInterval = null;
            document.getElementById('progress-container').style.display = 'none';
            toggleLoading(false);
        }

        function clearUrl() {
            const input = document.getElementById('url');
            input.value = '';
            handleUrlInput();
            input.focus();
        }

        async function browseFolder() {
            try {
                const res = await fetch(`${API_BASE}/browse-folder`);
                const data = await res.json();
                if (data.status === 'success') document.getElementById('save-path').value = data.path;
            } catch (err) {
                console.error(err);
            }
        }

        async function openOutputFolder() {
            if (!currentDownloadPath) return;
            fetch(`${API_BASE}/open-location`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: currentDownloadPath })
            });
        }

        async function copyTranscript() {
            const area = document.getElementById('transcript-result');
            const btn = document.getElementById('copy-btn');
            try {
                await navigator.clipboard.writeText(area.value);
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = 'rgba(16, 185, 129, 0.4)';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
        }
    </script>
</body>
</html>
